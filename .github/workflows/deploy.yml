name: Deploy to serverkitlabs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install sshpass
        run: apt-get update && apt-get install -y sshpass

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@$SSH_HOST << 'EOF'
            set -e
            echo "Deploying ServerKit Labs..."
            cd ~/docker-vps || mkdir -p ~/docker-vps && cd ~/docker-vps

            # Initialize git repo if not already
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/me-sharif-hasan/docker-vps.git
            fi

            # Fetch latest code
            git fetch origin main
            git checkout -f origin/main

            # Install/update dependencies
            npm install --production

            # Restart the service
            if pm2 list | grep -q "serverkit-labs"; then
              pm2 restart serverkit-labs
              echo "Service restarted successfully"
            else
              pm2 start server.js --name serverkit-labs
              echo "Service started successfully"
            fi

            echo "Deployment completed!"
          EOF
