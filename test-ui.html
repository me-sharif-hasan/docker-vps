<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServerKit Labs — Test UI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; color: #f8fafc; }
  .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 960px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #1e2130; border: 1px solid #2d3148; border-radius: 10px; padding: 1.25rem; }
  .card h2 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 1rem; }
  label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.35rem; }
  input { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 0.5rem 0.75rem; color: #e2e8f0; font-size: 0.85rem; outline: none; }
  input:focus { border-color: #6366f1; }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-danger  { background: #ef4444; color: #fff; }
  .btn-ghost   { background: #2d3148; color: #e2e8f0; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .result { margin-top: 1rem; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 0.75rem; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #a5f3fc; white-space: pre-wrap; word-break: break-all; max-height: 260px; overflow-y: auto; }
  .result.error { color: #fca5a5; }
  .result.success { color: #86efac; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
  .badge-green { background: #14532d; color: #86efac; }
  .badge-red   { background: #450a0a; color: #fca5a5; }
  .badge-blue  { background: #1e3a5f; color: #93c5fd; }
  .stats-row { display: flex; gap: 1rem; margin-top: 0.5rem; }
  .stat { flex: 1; background: #0f1117; border-radius: 6px; padding: 0.75rem; text-align: center; }
  .stat .val { font-size: 1.5rem; font-weight: 700; color: #f8fafc; }
  .stat .lbl { font-size: 0.7rem; color: #64748b; margin-top: 0.1rem; }
  .key-box { position: relative; }
  .key-box textarea { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 0.5rem 0.75rem; color: #a5f3fc; font-family: monospace; font-size: 0.7rem; resize: none; outline: none; height: 100px; }
  .copy-btn { position: absolute; top: 0.4rem; right: 0.4rem; padding: 0.2rem 0.5rem; font-size: 0.7rem; }
  .conn-cmd { background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; padding: 0.5rem 0.75rem; font-family: monospace; font-size: 0.75rem; color: #fde68a; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-top: 0.5rem; word-break: break-all; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #uuid-gen { font-size: 0.7rem; color: #6366f1; cursor: pointer; margin-left: 0.5rem; }
  #uuid-gen:hover { text-decoration: underline; }
  .full-width { grid-column: 1 / -1; }
</style>
</head>
<body>

<h1>ServerKit Labs</h1>
<p class="subtitle">API Test UI — <span id="api-url"></span></p>

<div class="grid">

  <!-- Provision -->
  <div class="card">
    <h2>Provision Lab</h2>
    <label>UUID <span id="uuid-gen">generate</span></label>
    <input id="provision-uuid" type="text" placeholder="xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="provision()">Provision</button>
    </div>
    <div id="provision-result" class="result" style="display:none"></div>

    <!-- Creds shown after provision -->
    <div id="creds" style="display:none; margin-top:1rem;">
      <label style="margin-bottom:0.5rem;">SSH Private Key</label>
      <div class="key-box">
        <textarea id="key-display" readonly></textarea>
        <button class="btn btn-ghost copy-btn" onclick="copyKey()">copy</button>
      </div>
      <label style="margin-top:0.75rem; margin-bottom:0.25rem;">Connect Command</label>
      <div class="conn-cmd">
        <span id="conn-cmd-text"></span>
        <button class="btn btn-ghost" style="padding:0.2rem 0.5rem;font-size:0.7rem;flex-shrink:0" onclick="copyCmd()">copy</button>
      </div>
    </div>
  </div>

  <!-- Get Details -->
  <div class="card">
    <h2>Get Session Details</h2>
    <label>UUID</label>
    <input id="get-uuid" type="text" placeholder="xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx">
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="getDetails()">Fetch</button>
    </div>
    <div id="get-result" class="result" style="display:none"></div>
  </div>

  <!-- Destroy -->
  <div class="card">
    <h2>Destroy Session</h2>
    <label>UUID</label>
    <input id="destroy-uuid" type="text" placeholder="xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx">
    <div class="btn-row">
      <button class="btn btn-danger" onclick="destroy()">Destroy</button>
    </div>
    <div id="destroy-result" class="result" style="display:none"></div>
  </div>

  <!-- Stats -->
  <div class="card">
    <h2>Stats <button class="btn btn-ghost" style="padding:0.2rem 0.6rem;font-size:0.7rem;margin-left:0.5rem" onclick="fetchStats()">refresh</button></h2>
    <div class="stats-row">
      <div class="stat"><div class="val" id="stat-active">—</div><div class="lbl">Active</div></div>
      <div class="stat"><div class="val" id="stat-slots">—</div><div class="lbl">Available</div></div>
      <div class="stat"><div class="val" id="stat-max">—</div><div class="lbl">Max</div></div>
    </div>
    <div id="stats-result" class="result" style="display:none"></div>
  </div>

  <!-- Health -->
  <div class="card full-width">
    <h2>Health <button class="btn btn-ghost" style="padding:0.2rem 0.6rem;font-size:0.7rem;margin-left:0.5rem" onclick="fetchHealth()">ping</button></h2>
    <div id="health-result" class="result" style="display:none"></div>
  </div>

</div>

<script>
  const API = 'https://serverkitlabs.iishanto.com'
  document.getElementById('api-url').textContent = API

  function uuidv4() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16)
    })
  }

  document.getElementById('uuid-gen').onclick = () => {
    const u = uuidv4()
    document.getElementById('provision-uuid').value = u
  }

  function showResult(id, data, isError) {
    const el = document.getElementById(id)
    el.style.display = 'block'
    el.className = 'result' + (isError ? ' error' : ' success')
    el.textContent = JSON.stringify(data, null, 2)
  }

  function setLoading(btnEl, loading) {
    if (loading) {
      btnEl._text = btnEl.innerHTML
      btnEl.innerHTML = '<span class="spinner"></span>'
      btnEl.disabled = true
    } else {
      btnEl.innerHTML = btnEl._text
      btnEl.disabled = false
    }
  }

  async function provision() {
    const uuid = document.getElementById('provision-uuid').value.trim()
    if (!uuid) return alert('Enter a UUID')
    const btn = event.target
    setLoading(btn, true)
    document.getElementById('creds').style.display = 'none'
    try {
      const res = await fetch(`${API}/labs/provision`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uuid })
      })
      const data = await res.json()
      showResult('provision-result', data, !data.success)
      if (data.success) {
        // fill in other fields
        document.getElementById('get-uuid').value = uuid
        document.getElementById('destroy-uuid').value = uuid
        // show creds
        document.getElementById('key-display').value = data.data.privateKey
        document.getElementById('conn-cmd-text').textContent = data.data.connectCommand
        document.getElementById('creds').style.display = 'block'
        fetchStats()
      }
    } catch (e) {
      showResult('provision-result', { error: e.message }, true)
    }
    setLoading(btn, false)
  }

  async function getDetails() {
    const uuid = document.getElementById('get-uuid').value.trim()
    if (!uuid) return alert('Enter a UUID')
    const btn = event.target
    setLoading(btn, true)
    try {
      const res = await fetch(`${API}/labs/${uuid}`)
      const data = await res.json()
      showResult('get-result', data, !data.success)
    } catch (e) {
      showResult('get-result', { error: e.message }, true)
    }
    setLoading(btn, false)
  }

  async function destroy() {
    const uuid = document.getElementById('destroy-uuid').value.trim()
    if (!uuid) return alert('Enter a UUID')
    if (!confirm(`Destroy session ${uuid}?`)) return
    const btn = event.target
    setLoading(btn, true)
    try {
      const res = await fetch(`${API}/labs/${uuid}`, { method: 'DELETE' })
      const data = await res.json()
      showResult('destroy-result', data, !data.success)
      if (data.success) fetchStats()
    } catch (e) {
      showResult('destroy-result', { error: e.message }, true)
    }
    setLoading(btn, false)
  }

  async function fetchStats() {
    try {
      const res = await fetch(`${API}/labs/stats`)
      const data = await res.json()
      if (data.success) {
        document.getElementById('stat-active').textContent = data.data.activeSessions
        document.getElementById('stat-slots').textContent = data.data.availableSlots
        document.getElementById('stat-max').textContent = data.data.maxConcurrent
      }
      showResult('stats-result', data, !data.success)
    } catch (e) {
      showResult('stats-result', { error: e.message }, true)
    }
  }

  async function fetchHealth() {
    try {
      const res = await fetch(`${API}/health`)
      const data = await res.json()
      showResult('health-result', data, false)
    } catch (e) {
      showResult('health-result', { error: e.message }, true)
    }
  }

  function copyKey() {
    navigator.clipboard.writeText(document.getElementById('key-display').value)
      .then(() => { const b = event.target; b.textContent = 'copied!'; setTimeout(() => b.textContent = 'copy', 1500) })
  }

  function copyCmd() {
    navigator.clipboard.writeText(document.getElementById('conn-cmd-text').textContent)
      .then(() => { const b = event.target; b.textContent = 'copied!'; setTimeout(() => b.textContent = 'copy', 1500) })
  }

  // init
  fetchStats()
  fetchHealth()
</script>
</body>
</html>
